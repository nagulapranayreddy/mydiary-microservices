<!DOCTYPE html>
<html>
<head>
    <title>Add Diary</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 450px;
            background-color: white;
            margin: 80px auto;
            padding: 30px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        textarea {
            height: 150px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: gray;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Add Diary</h2>

    <form id="diaryForm">
        <label>Title</label>
        <input type="text" id="title" placeholder="Enter diary title">

        <label>Content</label>
        <textarea id="content" placeholder="Write your diary here..."></textarea>

        <button type="submit">Save Diary</button>
    </form>

    <a href="home.html">Back to Home</a>
</div>

<script src="../JS/add_diary.js"></script>

</body>
</html>
