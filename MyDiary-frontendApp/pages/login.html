<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 350px;
            background-color: white;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: gray;
        }

        p {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">

        <button type="submit">Login</button>
    </form>

    <p>
        New user?
        <a href="register.html">Register</a>
    </p>
</div>

<script src="../JS/login.js"></script>

</body>
</html>
